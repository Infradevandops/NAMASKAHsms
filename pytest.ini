[pytest]
asyncio_mode = auto
markers =
    asyncio: marks tests as async
    e2e: marks tests as end-to-end
    smoke: marks tests as smoke tests
    slow: marks tests as slow
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 30
addopts = -v --tb=short
