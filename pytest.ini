[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
asyncio_mode = auto
asyncio_default_fixture_scope = function
markers =
    smoke: critical smoke tests run on every deploy
    integration: integration tests requiring live DB/Redis
addopts =
    --verbose
    --ignore=tests/frontend
    --ignore=PythonClient
    -p no:warnings
