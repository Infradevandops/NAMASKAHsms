name: Deploy to Production

on:
  # Task 2.3 — Gate on CI passing (not raw push)
  workflow_run:
    workflows: ["CI - Balanced Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if CI did not pass'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    # Task 2.3 — Only deploy if CI passed (bypass allowed via manual dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment prerequisites
        run: |
          test -f render.yaml || (echo "❌ render.yaml missing" && exit 1)
          test -f main.py || (echo "❌ main.py missing" && exit 1)
          test -f requirements.txt || (echo "❌ requirements.txt missing" && exit 1)
          echo "✅ All required files present"

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "❌ RENDER_DEPLOY_HOOK not set"
            exit 1
          fi
          echo "🚀 Triggering Render deployment..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_DEPLOY_HOOK")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Deployment triggered (HTTP $HTTP_CODE)"
          else
            echo "❌ Deployment trigger failed (HTTP $HTTP_CODE)"
            exit 1
          fi

      - name: Wait and health check (blocking, 12 retries × 15s = 3 min)
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          if [ -z "$PROD_URL" ]; then
            echo "⚠️ PRODUCTION_URL not set — skipping health check"
            exit 0
          fi
          echo "🏥 Polling production health..."
          for i in {1..12}; do
            if curl -f -s "${PROD_URL}/health" > /dev/null; then
              echo "✅ Production is healthy (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/12 failed, retrying in 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 12 attempts (3 minutes)"
          exit 1

      # Task 2.1 — Automatic rollback on any failure
      - name: Rollback on failure
        if: failure()
        env:
          RENDER_ROLLBACK_HOOK: ${{ secrets.RENDER_ROLLBACK_HOOK }}
        run: |
          if [ -z "$RENDER_ROLLBACK_HOOK" ]; then
            echo "⚠️ RENDER_ROLLBACK_HOOK not set — cannot auto-rollback"
            exit 0
          fi
          echo "⏪ Deployment failed — triggering rollback..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_ROLLBACK_HOOK")
          echo "Rollback hook response: HTTP $HTTP_CODE"

      - name: Deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment completed successfully"
          else
            echo "❌ Deployment failed — rollback triggered"
          fi

  # Task 5.1 — Post-deploy smoke tests against production
  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-playwright
          playwright install chromium

      - name: Run smoke tests against production
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL }}
          ENVIRONMENT: production
        run: pytest tests/e2e/ -m smoke -v --tb=short

      - name: Upload smoke test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-report-${{ github.run_id }}
          path: smoke-report.html

      # Task 2.1 — Rollback if smoke tests fail
      - name: Rollback on smoke test failure
        if: failure()
        env:
          RENDER_ROLLBACK_HOOK: ${{ secrets.RENDER_ROLLBACK_HOOK }}
        run: |
          if [ -z "$RENDER_ROLLBACK_HOOK" ]; then
            echo "⚠️ RENDER_ROLLBACK_HOOK not set — cannot auto-rollback"
            exit 0
          fi
          echo "⏪ Smoke tests failed — triggering rollback..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$RENDER_ROLLBACK_HOOK")
          echo "Rollback hook response: HTTP $HTTP_CODE"
