name: CI - Minimal & Reliable

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Stage 1: Fast checks (fail fast)
  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz | tar -xz
          sudo mv gitleaks /usr/local/bin/
      - name: Run gitleaks
        run: gitleaks detect --source . --config tools/gitleaks.toml --verbose

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Clear pip cache
        run: |
          rm -rf ~/.cache/pip
          rm -rf ~/.local/lib/python*/site-packages
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black==24.3.0 isort==5.13.2

      - name: Critical syntax check
        run: flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Code formatting (parallel)
        run: |
          black --check app/ --quiet &
          BLACK_PID=$!
          isort --check-only app/ --profile black --quiet &
          ISORT_PID=$!
          
          # Wait for both and capture exit codes
          wait $BLACK_PID
          BLACK_EXIT=$?
          wait $ISORT_PID
          ISORT_EXIT=$?
          
          # Exit with error if either failed
          if [ $BLACK_EXIT -ne 0 ] || [ $ISORT_EXIT -ne 0 ]; then
            echo "Code formatting check failed"
            [ $BLACK_EXIT -ne 0 ] && echo "  - black check failed"
            [ $ISORT_EXIT -ne 0 ] && echo "  - isort check failed"
            exit 1
          fi
          
          echo "✅ Code formatting checks passed"

  # Stage 2: Unit tests (only blocking check)
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [secrets-scan, code-quality]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: namaskah_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements/requirements-test.txt

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.cache/ms-playwright
            /usr/bin/psql
            /usr/bin/pg_isready
          key: ${{ runner.os }}-deps-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('alembic/versions/*.py') }}
          restore-keys: |
            ${{ runner.os }}-deps-${{ hashFiles('**/requirements*.txt') }}-
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: |
          # Install PostgreSQL client only if not cached
          if ! command -v psql &> /dev/null; then
            echo "Installing PostgreSQL client..."
            sudo apt-get update -qq
            sudo apt-get install -y -qq postgresql-client
          else
            echo "PostgreSQL client already cached"
          fi
          
          # Use pip cache and pre-built wheels for faster installation
          pip install --upgrade pip wheel
          pip install -r requirements.txt --prefer-binary
          pip install -r requirements/requirements-test.txt --prefer-binary

      - name: Initialize test database
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-min-32-chars-long
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-min-32-chars-long
          ENVIRONMENT: testing
          TESTING: '1'
          PGPASSWORD: test_password
        run: |
          # Wait for PostgreSQL to be ready
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          # Terminate all connections and drop database
          psql -h localhost -U postgres -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = 'namaskah_test';"
          psql -h localhost -U postgres -c "DROP DATABASE IF EXISTS namaskah_test;"
          psql -h localhost -U postgres -c "CREATE DATABASE namaskah_test;"
          
          # Run migrations to ensure schema matches production
          alembic upgrade head
          
          echo "✅ Test database initialized with migrations"

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-min-32-chars-long
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-min-32-chars-long
          ENVIRONMENT: testing
          TESTING: '1'
          TEXTVERIFIED_API_KEY: test-key
          TEXTVERIFIED_USERNAME: test-user
          PAYSTACK_SECRET_KEY: test-key
          TELNYX_ENABLED: 'false'
          FIVESIM_ENABLED: 'false'
        run: |
          # Run tests sequentially for now (parallel execution has issues with SQLite in-memory DBs)
          # Skip known flaky tests that need fixing
          pytest tests/unit/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=30 \
            --tb=short \
            --ignore=tests/unit/providers \
            --ignore=tests/unit/test_auth_endpoints_comprehensive.py \
            --ignore=tests/unit/test_auth_service_expanded.py \
            --ignore=tests/unit/test_auth_service_complete.py \
            --ignore=tests/unit/test_credit_service.py \
            --ignore=tests/unit/test_credit_service_complete.py \
            --ignore=tests/unit/test_area_code_retry.py \
            --ignore=tests/unit/test_alerting_service.py \
            --deselect=tests/unit/test_core_modules_comprehensive.py::TestTokenManager::test_verify_token_expired \
            --maxfail=5



  # Optional: E2E tests (non-blocking, main only)
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [tests]
    continue-on-error: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: namaskah_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-playwright pytest-html

      - name: Initialize Database
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
        run: |
          psql -h localhost -U postgres -c "CREATE DATABASE namaskah_test;" 2>/dev/null || true
          python scripts/fix_production_schema.py || true

      - name: Install Playwright
        run: playwright install chromium --with-deps

      - name: Start Application
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-testing-only-min-32-chars
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-testing-min-32-chars
          ENVIRONMENT: testing
          TESTING: '1'
          TEXTVERIFIED_API_KEY: test-key
          PAYSTACK_SECRET_KEY: test-key
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          
          uvicorn main:app --host 0.0.0.0 --port 8000 --log-level debug 2>&1 | tee app-startup.log &
          APP_PID=$!
          
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "✅ App is ready"
              break
            fi
            echo "Waiting for app... ($i/60)"
            sleep 1
          done
          
          if ! curl -f http://localhost:8000/health; then
            echo "❌ App failed to start"
            cat app-startup.log
            kill $APP_PID 2>/dev/null || true
            exit 1
          fi

      - name: Run E2E Tests
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-testing-only-min-32-chars
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-testing-min-32-chars
          ENVIRONMENT: testing
          TESTING: '1'
          BASE_URL: http://localhost:8000
          TEST_USER_EMAIL: admin@namaskah.app
          TEST_USER_PASSWORD: test-password-123
        run: pytest tests/e2e/ -v --html=e2e-report.html -m "not slow" || true

      - name: Upload E2E Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-reports-${{ github.run_id }}
          path: e2e-report.html
