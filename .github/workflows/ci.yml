name: CI - Balanced Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  PYTHON_VERSION: '3.11'
  
jobs:
  # Fast feedback - syntax and basic checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          pip install flake8 black isort
          pip install -r requirements.txt
      
      - name: Critical syntax check (blocking)
        run: |
          # Block on critical syntax errors only
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
      
      - name: Code formatting (informational)
        run: |
          black --check app/ --diff || echo "⚠️ Code formatting issues found"
          isort --check-only app/ --diff || echo "⚠️ Import sorting issues found"
        continue-on-error: true

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install security tools
        run: pip install bandit safety
      
      - name: Security scan (informational)
        run: |
          bandit -r app/ -ll || echo "⚠️ Security issues found - review required"
          safety check || echo "⚠️ Dependency vulnerabilities found"
        continue-on-error: true

  # Core functionality tests
  tests:
    name: Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: namaskah_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:test_password@localhost:5432/namaskah_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-min-32-chars-long
          JWT_SECRET_KEY: test-jwt-secret-key-for-ci-only-min-32-chars-long
          ENVIRONMENT: testing
          TEXTVERIFIED_API_KEY: test-key
          PAYSTACK_SECRET_KEY: test-key
        run: |
          # Run tests with reasonable coverage target
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=18 \
            --maxfail=10 \
            --tb=short
      
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # Deployment readiness (main branch only)
  deployment-readiness:
    name: Deployment Readiness
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [code-quality, tests]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate deployment files
        run: |
          echo "🔍 Checking deployment configuration..."
          
          # Critical files must exist
          test -f render.yaml || (echo "❌ render.yaml missing" && exit 1)
          test -f main.py || (echo "❌ main.py missing" && exit 1)
          test -f requirements.txt || (echo "❌ requirements.txt missing" && exit 1)
          
          echo "✅ Deployment files validated"
      
      - name: Check secrets configuration
        run: |
          echo "🔐 Validating secrets..."
          
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK not configured"
            echo "ℹ️ Add deploy hook to enable auto-deployment"
          else
            echo "✅ RENDER_DEPLOY_HOOK configured"
          fi
          
          if [ -z "${{ secrets.PRODUCTION_URL }}" ]; then
            echo "⚠️ PRODUCTION_URL not configured"
          else
            echo "✅ PRODUCTION_URL configured"
          fi