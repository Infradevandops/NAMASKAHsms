name: Sync to GitLab Backup

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync:
    name: Mirror to GitLab
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for proper sync
      
      - name: Mirror to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          if [ -z "$GITLAB_TOKEN" ]; then
            echo "⚠️  GITLAB_TOKEN not set, skipping sync"
            echo "ℹ️  Add GITLAB_TOKEN to GitHub secrets to enable auto-sync"
            echo "ℹ️  Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 0
          fi
          
          # Configure git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Add GitLab as remote (ignore if exists)
          git remote add gitlab https://oauth2:${GITLAB_TOKEN}@gitlab.com/oghenesuvwe-group/NAMASKAHsms.git 2>/dev/null || true
          
          # Get current branch
          BRANCH=${GITHUB_REF#refs/heads/}
          
          # Push to GitLab
          echo "📤 Pushing branch: $BRANCH"
          git push gitlab $BRANCH --force
          
          echo "✅ Successfully synced $BRANCH to GitLab backup"
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Failed to sync to GitLab"
          echo "Check GitLab token and repository access"
