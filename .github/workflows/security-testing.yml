name: Security & Testing Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Task 5.2 — Weekly scheduled accessibility audit
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9am UTC

# NOTE: security-scan and test-suite jobs removed — duplicated by ci.yml (blocking).
# This workflow owns: e2e-tests, accessibility-audit, deployment-check only.

jobs:
  e2e-tests:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    name: E2E Tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-playwright pytest-html

    - name: Install Playwright
      run: playwright install chromium

    - name: Start Application
      env:
        DATABASE_URL: sqlite:///./test.db
        SECRET_KEY: test-secret-key-for-ci-testing-only
        JWT_SECRET_KEY: test-jwt-secret-key-for-ci-testing
      run: |
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        for i in {1..12}; do
          curl -sf http://localhost:8000/health && break
          echo "Waiting for app... ($i/12)"
          sleep 5
        done
        curl -f http://localhost:8000/health || (echo "❌ App failed to start" && exit 1)

    - name: Run Full E2E Suite
      run: pytest tests/e2e/ -v --html=e2e-report.html

    - name: Upload E2E Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-reports-${{ github.run_id }}
        path: e2e-report.html

  # Task 5.2 — Accessibility audit (push + weekly schedule)
  accessibility-audit:
    runs-on: ubuntu-latest
    name: Accessibility Audit

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install accessibility tools
      run: |
        npm install -g @axe-core/cli pa11y lighthouse
        npx playwright install chromium

    - name: Set up Python and start app
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Start application for testing
      env:
        DATABASE_URL: sqlite:///./test.db
        SECRET_KEY: test-secret-key-for-ci-testing-only
        JWT_SECRET_KEY: test-jwt-secret-key-for-ci-testing
      run: |
        pip install -r requirements.txt
        uvicorn main:app --host 0.0.0.0 --port 8000 &
        for i in {1..12}; do
          curl -sf http://localhost:8000/health && break
          echo "Waiting for app... ($i/12)"
          sleep 5
        done
        curl -f http://localhost:8000/health || (echo "❌ App failed to start" && exit 1)

    # Task 5.2 — Use PRODUCTION_URL for scheduled runs, localhost for push/PR
    - name: Set audit target URL
      run: |
        if [ "${{ github.event_name }}" == "schedule" ] && [ -n "${{ secrets.PRODUCTION_URL }}" ]; then
          echo "AUDIT_URL=${{ secrets.PRODUCTION_URL }}" >> $GITHUB_ENV
        else
          echo "AUDIT_URL=http://localhost:8000" >> $GITHUB_ENV
        fi

    - name: Run axe accessibility scan
      run: axe ${{ env.AUDIT_URL }} --save axe-report.json || true

    - name: Run pa11y accessibility test
      run: pa11y ${{ env.AUDIT_URL }} --reporter json > pa11y-report.json || true

    - name: Run Lighthouse accessibility audit
      run: lighthouse ${{ env.AUDIT_URL }} --only-categories=accessibility --output json --output-path lighthouse-a11y.json || true

    - name: Upload Accessibility Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: accessibility-reports-${{ github.run_id }}
        path: |
          axe-report.json
          pa11y-report.json
          lighthouse-a11y.json

