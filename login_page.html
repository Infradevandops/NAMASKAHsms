    <!-- Critical CSS - Inline for fast render -->
    <style>
        :root {
            --primary: #FE3C72;
            --primary-light: #FFF0F3;
            --bg-body: #ffffff;
            --bg-sidebar: #f9fafb;
            --bg-card: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6b7280;
            --sidebar-width: 260px;
            --radius-card: 16px;
            --shadow-soft: 0 4px 12px rgba(0, 0, 0, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 40px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>

    

<style>
.public-layout { min-height: 100vh; display: flex; flex-direction: column; }
.public-header { background: white; border-bottom: 1px solid rgba(0,0,0,0.05); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }

.nav-links a:hover { color: var(--primary); }
.public-content { flex: 1; padding: 40px; }
.public-footer { background: var(--bg-sidebar); border-top: 1px solid rgba(0,0,0,0.05); padding: 24px 40px; text-align: center; color: var(--text-muted); font-size: 14px; }

@media (max-width: 768px) {
    .public-header { padding: 16px 20px; }
    .public-content { padding: 20px; }
    .nav-links { gap: 12px; }
}
</style>

<style>
    .auth-container {
        max-width: 440px;

        font-size: 14px;
        color: var(--text-main);
    }

    .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.2s;
        background: white !important;

    .form-input:-webkit-autofill,
    .form-input:-webkit-autofill:hover,

        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: var(--text-main) !important;
    }

    .form-input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px var(--primary-light);
    }

    .checkbox-group {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 20px;
    }

    .checkbox-group input {
        width: 18px;
        height: 18px;
        cursor: pointer;
    }

    .checkbox-group label {
        font-size: 14px;
        color: var(--text-main);
        cursor: pointer;
    }

    .btn-auth {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-auth:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .btn-auth:active {
        transform: scale(0.98);
    }

    .divider {

        text-align: center;
        margin: 24px 0;
        color: var(--text-muted);
        font-size: 14px;
    }

    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid #e0e0e0;
    }

    .divider span {
        padding: 0 12px;
    }

    .social-buttons {
        display: flex;
        justify-content: center;
        gap: 16px;
    }

    .btn-social {
        width: 48px;
        height: 48px;
        padding: 0;
        border: 1px solid #e0e0e0;
        border-radius: 50%;
        background: white;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .btn-social:hover {

    }

    }

        text-decoration: underline;
    }
</style>

<script>
    // Auto-fill saved credentials on page load
    window.addEventListener('DOMContentLoaded', () => {
        const savedEmail = localStorage.getItem('saved_email');
        const savedPassword = localStorage.getItem('saved_password');
        const remember = localStorage.getItem('remember_me') === 'true';
        
        if (remember && savedEmail && savedPassword) {
            document.getElementById('email').value = savedEmail;
            document.getElementById('password').value = savedPassword;
            document.getElementById('remember').checked = true;
        }
    });

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const errorDiv = document.getElementById('error-message');

        btn.textContent = "Signing in...";
        btn.disabled = true;
        errorDiv.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;

        // Save credentials if remember me is checked
        if (remember) {
            localStorage.setItem('saved_email', email);
            localStorage.setItem('saved_password', password);
            localStorage.setItem('remember_me', 'true');
        } else {
            localStorage.removeItem('saved_email');
            localStorage.removeItem('saved_password');
            localStorage.removeItem('remember_me');
        }

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            await processLoginResponse(res);
        } catch (err) {
            showError("Connection error. Please try again.");
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    }

    async function processLoginResponse(res) {
        const btn = document.getElementById('login-btn');
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('access_token', data.access_token);
            // Set cookie for server-side auth
            document.cookie = `access_token=${data.access_token}; path=/; max-age=604800; SameSite=Lax`;
            window.location.href = '/dashboard';
        } else {
            const data = await res.json();
            showError(data.detail || "Invalid credentials");
            btn.disabled = false;
            btn.textContent = "Sign In";
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-message');
        el.textContent = msg;
        el.style.display = 'block';
    }

    function socialLogin(provider) {
        showError(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`);
    }

    function togglePassword() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eye-icon');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            input.type = 'password';
            icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    }
</script>

<style>
.notification-bell {
    position: relative;
}

.bell-button {
    background: #f0f0f0;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    position: relative;

}

.bell-button:hover {
    background: #e8e8e8;
}

.bell-icon {
    font-size: 18px;
}

.badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #ef4444;
    color: white;
    border-radius: 10px;
    padding: 2px 6px;

    font-weight: 700;
    min-width: 18px;
    text-align: center;
}

.notification-dropdown {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    width: 360px;
    max-height: 480px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    border: 1px solid rgba(0,0,0,0.08);
    z-index: 1000;
    overflow: hidden;
}

.dropdown-header {
    padding: 16px;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.dropdown-header h3 {
    font-size: 16px;
    font-weight: 700;
    margin: 0;
}

.mark-read-btn {
    background: none;
    border: none;
    color: #06b6d4;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    padding: 4px 8px;
}

.mark-read-btn:hover {
    text-decoration: underline;
}

.notification-list {
    max-height: 400px;
    overflow-y: auto;
}

.notification-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.05);
    cursor: pointer;
    transition: background 0.2s;
}

.notification-item:hover {
    background: #f9f9f9;
}

.notification-item.unread {
    background: #f0f9ff;
}

.notification-item.unread::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background: #06b6d4;
    border-radius: 50%;
}

.notification-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
}

.notification-message {
    font-size: 13px;
    color: #666;
    margin-bottom: 4px;
}

.notification-time {
    font-size: 12px;
    color: #999;
}

.loading, .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: #999;
}
</style>

<script>
(function() {
    'use strict';
    
    let notificationsOpen = false;
    
    // Initialize on DOM ready
    function init() {
        const button = document.querySelector('.bell-button');
        if (button) {
            button.addEventListener('click', toggleNotifications);
            console.log('✅ Notification bell initialized');
        } else {
            console.error('❌ Bell button not found');
        }
        
        // Close on outside click
        document.addEventListener('click', (e) => {
            const bell = document.getElementById('notification-bell');
            if (bell && !bell.contains(e.target) && notificationsOpen) {
                toggleNotifications();
            }
        });
        
        // Load notifications on init
        loadNotifications();
    }
    
    // Toggle dropdown visibility
    function toggleNotifications() {
        const dropdown = document.getElementById('notification-dropdown');
        if (!dropdown) {
            console.error('❌ Dropdown not found');
            return;
        }
        
        notificationsOpen = !notificationsOpen;
        dropdown.style.display = notificationsOpen ? 'block' : 'none';
        
        if (notificationsOpen) {
            loadNotifications();
        }
    }
    
    // Load notifications from API
    async function loadNotifications() {
        const list = document.getElementById('notification-list');
        const badge = document.getElementById('notification-badge');
        
        if (!list) {
            console.error('❌ Notification list not found');
            return;
        }
        
        try {
            const token = localStorage.getItem('access_token');
            if (!token) {
                console.warn('⚠️ No auth token');
                list.innerHTML = '<div class="empty-state">Please log in</div>';
                return;
            }
            
            const res = await fetch('/api/notifications', {
                headers: { 
                    'Authorization': `Bearer ${token}`,
                    'Cache-Control': 'no-cache'
                }
            });
            
            if (!res.ok) {
                throw new Error(`API error: ${res.status}`);
            }
            
            const data = await res.json();
            const notifications = data.notifications || [];
            const unreadCount = notifications.filter(n => !n.is_read).length;
            
            // Update badge
            if (unreadCount > 0) {
                badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
            
            // Render notifications
            if (notifications.length === 0) {
                list.innerHTML = '<div class="empty-state">No notifications</div>';
            } else {
                list.innerHTML = notifications.map(n => `
                    <div class="notification-item ${n.is_read ? '' : 'unread'}" 
                         onclick="markAsRead('${n.id}', '${n.link || ''}')">
                        <div class="notification-title">${escapeHtml(n.title)}</div>
                        <div class="notification-message">${escapeHtml(n.message || '')}</div>
                        <div class="notification-time">${formatTime(n.created_at)}</div>
                    </div>
                `).join('');
            }
            
            console.log(`✅ Loaded ${notifications.length} notifications`);
        } catch (error) {
            console.error('❌ Notification load failed:', error);
            list.innerHTML = '<div class="empty-state">Failed to load notifications</div>';
        }
    }
    
    // Mark single notification as read
    async function markAsRead(notificationId, link) {
        try {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            
            await fetch(`/api/notifications/${notificationId}/read`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            loadNotifications();
            
            if (link) {
                window.location.href = link;
            }
        } catch (error) {
            console.error('❌ Mark read error:', error);
        }
    }
    
    // Mark all notifications as read
    async function markAllRead() {
        try {
            const token = localStorage.getItem('access_token');
            if (!token) return;
            
            await fetch('/api/notifications/mark-all-read', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            
            loadNotifications();
        } catch (error) {
            console.error('❌ Mark all read error:', error);
        }
    }
    
    // Format time
    function formatTime(timestamp) {
        if (!timestamp) return '';
        const date = new Date(timestamp);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);
        
        if (diff < 60) return 'Just now';
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
        return date.toLocaleDateString();
    }
    
    // Escape HTML
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Expose globally
    window.toggleNotifications = toggleNotifications;
    window.markAsRead = markAsRead;
    window.markAllRead = markAllRead;
    window.refreshNotifications = loadNotifications;
    
    // Initialize when DOM is ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
    
    // Refresh every 30 seconds
    setInterval(loadNotifications, 30000);
})();
</script>

<script>
    function showLoading(element) {
        if (!element) return;
        const template = document.getElementById('loading-spinner-template');
        const clone = template.firstElementChild.cloneNode(true);
        clone.id = 'active-loader';

        // Ensure parent is relative
        const style = window.getComputedStyle(element);
        if (style.position === 'static') element.style.position = 'relative';

        element.appendChild(clone);
        return clone;
    }

    function hideLoading(element) {
        if (!element) return;
        const loader = element.querySelector('#active-loader');
        if (loader) loader.remove();
    }
</script>
