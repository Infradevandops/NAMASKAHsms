{% extends "public_base.html" %}

{% block page_title %}Sign Up{% endblock %}

{% block head_extra %}
{{ super() }}
<style>
    .auth-container {
        max-width: 440px;
        margin: 20px auto;
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .auth-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 32px;
        background: var(--bg-sidebar);
        padding: 4px;
        border-radius: 12px;
    }

    .auth-tab {
        flex: 1;
        padding: 12px;
        text-align: center;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-muted);
    }

    .auth-tab.active {
        background: white;
        color: var(--primary);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
        font-size: 14px;
        color: var(--text-main);
    }

    .form-input {
        width: 100%;
        padding: 12px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: border-color 0.2s;
        background: white !important;
    }

    .form-input:-webkit-autofill,
    .form-input:-webkit-autofill:hover,
    .form-input:-webkit-autofill:focus {
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: var(--text-main) !important;
    }

    .form-input:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px var(--primary-light);
    }

    .btn-auth {
        width: 100%;
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .btn-auth:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .btn-auth:active {
        transform: scale(0.98);
    }

    .error-msg {
        background: #fff0f0;
        color: #e02b2b;
        padding: 12px;
        border-radius: 8px;
        margin-bottom: 20px;
        text-align: center;
        font-size: 14px;
        display: none;
    }

    .strength-meter {
        height: 4px;
        background: #eee;
        margin-top: 8px;
        border-radius: 2px;
        overflow: hidden;
        display: flex;
    }

    .strength-segment {
        flex: 1;
        opacity: 0.3;
        margin-right: 2px;
        background: #ccc;
    }

    .strength-segment:last-child {
        margin-right: 0;
    }

    .weak .strength-segment:nth-child(1) {
        background: #ff4757;
        opacity: 1;
    }

    .medium .strength-segment:nth-child(1),
    .medium .strength-segment:nth-child(2) {
        background: #ffa502;
        opacity: 1;
    }

    .strong .strength-segment {
        background: #2ecc71;
        opacity: 1;
    }

    .strength-text {
        font-size: 12px;
        margin-top: 4px;
        color: #666;
        text-align: right;
    }
</style>
{% endblock %}

{% block public_content %}
<div class="auth-container">
    <div class="auth-tabs">
        <div class="auth-tab" id="tab-login">Login</div>
        <div class="auth-tab active" id="tab-register">Sign Up</div>
    </div>

    <div id="error-message" class="error-msg"></div>

    <form id="register-form">
        <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-input" id="email" required placeholder="name@example.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" class="form-input" id="password" required placeholder="Create a strong password" autocomplete="new-password">
            <div class="strength-meter" id="strength-meter">
                <div class="strength-segment"></div>
                <div class="strength-segment"></div>
                <div class="strength-segment"></div>
            </div>
            <div class="strength-text" id="strength-text"></div>
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label style="display: flex; align-items: start; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="terms" required style="margin-top: 4px; width: 18px; height: 18px; cursor: pointer;">
                <span style="font-size: 14px; color: var(--text-main);">I agree to the <a href="/terms" target="_blank" style="color: var(--primary); text-decoration: none;">Terms of Service</a> and <a href="/privacy" target="_blank" style="color: var(--primary); text-decoration: none;">Privacy Policy</a></span>
            </label>
        </div>

        <button type="submit" class="btn-auth" id="register-btn">Create Account</button>
    </form>

    <div style="text-align: center; margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
        <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 12px;">Or continue with</p>
        <button class="btn-auth" onclick="window.location.href='/api/auth/google'" style="background: white; color: #37352F; border: 1px solid #e0e0e0; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            <span>Continue with Google</span>
        </button>
    </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    document.getElementById('tab-login').addEventListener('click', () => { window.location.href = '/auth/login'; });
    document.getElementById('tab-register').addEventListener('click', () => { window.location.href = '/auth/register'; });
    document.getElementById('register-form').addEventListener('submit', handleRegister);
    document.getElementById('password').addEventListener('input', (e) => checkStrength(e.target.value));

    function checkStrength(password) {
        const meter = document.getElementById('strength-meter');
        const text = document.getElementById('strength-text');

        meter.className = 'strength-meter';

        if (password.length === 0) {
            text.textContent = '';
            return;
        }

        let score = 0;
        if (password.length > 8) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        if (score < 2) {
            meter.classList.add('weak');
            text.textContent = 'Weak';
            text.style.color = '#ff4757';
        } else if (score < 4) {
            meter.classList.add('medium');
            text.textContent = 'Medium';
            text.style.color = '#ffa502';
        } else {
            meter.classList.add('strong');
            text.textContent = 'Strong';
            text.style.color = '#2ecc71';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const btn = document.getElementById('register-btn');
        const errorDiv = document.getElementById('error-message');

        btn.textContent = "Creating Account...";
        btn.disabled = true;
        errorDiv.style.display = 'none';

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const termsAccepted = document.getElementById('terms').checked;

        // Validate terms acceptance
        if (!termsAccepted) {
            showError("You must accept the Terms of Service and Privacy Policy");
            btn.disabled = false;
            btn.textContent = "Create Account";
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email, 
                    password,
                    terms_accepted: termsAccepted 
                })
            });

            if (res.ok) {
                alert("Account created successfully! Please log in.");
                window.location.href = '/auth/login';
            } else {
                const data = await res.json();
                showError(data.detail || "Registration failed");
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        } catch (err) {
            showError("Connection error. Please try again.");
            btn.disabled = false;
            btn.textContent = "Create Account";
        }
    }

    function showError(msg) {
        const el = document.getElementById('error-message');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>
{% endblock %}
