<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - Namaskah</title>
  <script src="https://unpkg.com/tailwindcss-cdn@3.4.16/tailwindcss.js"></script>
  <style>
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white/10 backdrop-blur-xl rounded-2xl shadow-2xl p-8 border border-white/20">
      
      <div class="text-center mb-6">
        <div class="text-5xl mb-3">🌍</div>
        <h1 class="text-3xl font-bold text-white mb-2">Welcome to Namaskah</h1>
        <p class="text-zinc-400">Select your language and currency <span class="text-red-400">*</span></p>
      </div>

        <form id="welcomeForm" onsubmit="savePreferences(event)">
        <div class="mb-4">
          <label class="block text-white font-semibold mb-2">Language <span class="text-red-400">*</span></label>
          <select id="language" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white" required>
            <option value="">Choose language...</option>
            <option value="en">🇺🇸 English</option>
            <option value="es">🇪🇸 Español</option>
            <option value="fr">🇫🇷 Français</option>
            <option value="de">🇩🇪 Deutsch</option>
            <option value="pt">🇵🇹 Português</option>
            <option value="zh">🇨🇳 中文</option>
            <option value="ja">🇯🇵 日本語</option>
            <option value="ar">🇸🇦 العربية</option>
            <option value="hi">🇮🇳 हिन्दी</option>
            <option value="yo">🇳🇬 Yorùbá</option>
          </select>
        </div>

        <div class="mb-6">
          <label class="block text-white font-semibold mb-2">Currency <span class="text-red-400">*</span></label>
          <select id="currency" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white" required>
            <option value="">Choose currency...</option>
            <option value="USD">🇺🇸 USD - US Dollar ($)</option>
            <option value="EUR">🇪🇺 EUR - Euro (€)</option>
            <option value="GBP">🇬🇧 GBP - British Pound (£)</option>
            <option value="NGN">🇳🇬 NGN - Nigerian Naira (₦)</option>
            <option value="INR">🇮🇳 INR - Indian Rupee (₹)</option>
            <option value="CNY">🇨🇳 CNY - Chinese Yuan (¥)</option>
            <option value="JPY">🇯🇵 JPY - Japanese Yen (¥)</option>
            <option value="BRL">🇧🇷 BRL - Brazilian Real (R$)</option>
            <option value="CAD">🇨🇦 CAD - Canadian Dollar (C$)</option>
            <option value="AUD">🇦🇺 AUD - Australian Dollar (A$)</option>
          </select>
        </div>

        <button type="submit" class="w-full py-3 rounded-lg bg-cyan-500 hover:bg-cyan-400 text-white font-bold transition">
          Continue →
        </button>
      </form>

      <div class="text-center mt-4">
        <p class="text-zinc-500 text-xs">* Required fields</p>
      </div>
    </div>
  </div>

    <script nonce="{{ request.state.csp_nonce }}">
    async function savePreferences(e) {
      e.preventDefault();
      const language = document.getElementById('language').value;
      const currency = document.getElementById('currency').value;
      
      // Save to localStorage
      localStorage.setItem('language', language);
      localStorage.setItem('currency', currency);
      
      // Set cookie for non-authenticated users
      document.cookie = `preferences_set=true; path=/; max-age=31536000`;
      document.cookie = `language=${language}; path=/; max-age=31536000`;
      document.cookie = `currency=${currency}; path=/; max-age=31536000`;
      
      // Try to save to user account if authenticated
      const token = localStorage.getItem('access_token');
      if (token) {
        try {
          await fetch('/api/user/preferences', {
            method: 'PUT',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify({ language, currency })
          });
        } catch (error) {
          // Ignore if fails
        }
      }
      
      window.location.href = '/landing';
    }

    window.addEventListener('DOMContentLoaded', () => {
      const savedLang = localStorage.getItem('language');
      const savedCurr = localStorage.getItem('currency');
      if (savedLang) document.getElementById('language').value = savedLang;
      if (savedCurr) document.getElementById('currency').value = savedCurr;
    });
  </script>

</body>
</html>
