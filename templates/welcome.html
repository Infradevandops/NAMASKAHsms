<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - VRENUM SMS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#FE3C72',
            brandbg: '#0b0f19'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0b0f19;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 80vw;
      height: 80vh;
      background: radial-gradient(circle at center, rgba(254,60,114,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: -1;
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">

  <div class="w-full max-w-md relative z-10" id="wizard">

    <!-- Glassmorphism Card -->
    <div class="bg-white/[0.03] backdrop-blur-2xl rounded-3xl shadow-[0_8px_32px_rgba(0,0,0,0.4)] p-8 sm:p-10 border border-white/10 relative overflow-hidden">
      <!-- Top edge highlight -->
      <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>

      <!-- Close X Button -->
      <button onclick="skipOnboarding()" class="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors" title="Close and go to dashboard">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>
      </button>

      <!-- Step 1: Language & Currency -->
      <div>
        <div class="text-center mb-6 mt-2">
          <h1 class="text-2xl font-bold text-white mb-2">Welcome to VRENUM SMS</h1>
          <p class="text-zinc-400 text-sm">Choose your language and currency to get started</p>
        </div>
        <form id="welcomeForm" onsubmit="savePreferencesAndAdvance(event)">
          <div class="mb-4">
            <label class="block text-white font-semibold mb-2">Country <span class="text-red-400">*</span></label>
            <select id="country" onchange="onCountryChange(this.value)" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white" required style="color-scheme: dark;">
              <option value="">Choose country...</option>
              <option value="US">United States</option>
              <option value="GB">United Kingdom</option>
              <option value="ES">Spain</option>
              <option value="FR">France</option>
              <option value="DE">Germany</option>
              <option value="PT">Portugal</option>
              <option value="BR">Brazil</option>
              <option value="CN">China</option>
              <option value="JP">Japan</option>
              <option value="IN">India</option>
              <option value="NG">Nigeria</option>
              <option value="CA">Canada</option>
              <option value="AU">Australia</option>
            </select>
          </div>
          <div class="mb-4">
            <label class="block text-white font-semibold mb-2">Language <span class="text-red-400">*</span></label>
            <select id="language" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white" required style="color-scheme: dark;">
              <option value="">Choose language...</option>
              <option value="en">English</option>
              <option value="es">Español</option>
              <option value="fr">Français</option>
              <option value="de">Deutsch</option>
              <option value="pt">Português</option>
              <option value="zh">中文</option>
              <option value="ja">日本語</option>
              <option value="ar">العربية</option>
              <option value="hi">हिन्दी</option>
              <option value="yo">Yorùbá</option>
            </select>
          </div>
          <div class="mb-6">
            <label class="block text-white font-semibold mb-2">Currency <span class="text-red-400">*</span></label>
            <select id="currency" class="w-full p-3 rounded-lg bg-white/10 border border-white/20 text-white" required style="color-scheme: dark;">
              <option value="">Choose currency...</option>
              <option value="USD">USD - US Dollar ($)</option>
              <option value="EUR">EUR - Euro (€)</option>
              <option value="GBP">GBP - British Pound (£)</option>
              <option value="NGN">NGN - Nigerian Naira (₦)</option>
              <option value="INR">INR - Indian Rupee (₹)</option>
              <option value="CNY">CNY - Chinese Yuan (¥)</option>
              <option value="JPY">JPY - Japanese Yen (¥)</option>
              <option value="BRL">BRL - Brazilian Real (R$)</option>
              <option value="CAD">CAD - Canadian Dollar (C$)</option>
              <option value="AUD">AUD - Australian Dollar (A$)</option>
            </select>
          </div>

          <!-- NEW: Payment Method Selection -->
          <div id="payment-method-container" class="mb-6"></div>

          <div class="flex gap-3">
            <button type="button" onclick="skipOnboarding()" class="flex-1 py-3 rounded-lg bg-white/5 hover:bg-white/10 text-white font-medium transition">
              Skip
            </button>
            <button type="submit" class="flex-1 py-3 rounded-lg bg-primary hover:bg-primary/90 shadow-[0_0_15px_rgba(254,60,114,0.3)] text-white font-bold transition">
              Continue →
            </button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="/static/js/components/payment-method-selector.js"></script>
  <script nonce="{{ request.state.csp_nonce }}">
    window.addEventListener('DOMContentLoaded', () => {
      restorePreferences();
    });

    async function savePreferencesAndAdvance(e) {
      e.preventDefault();
      const country = document.getElementById('country').value;
      const language = document.getElementById('language').value;
      const currency = document.getElementById('currency').value;
      const preferredPaymentMethod = localStorage.getItem('preferred_payment_method');

      localStorage.setItem('country', country);
      localStorage.setItem('language', language);
      localStorage.setItem('currency', currency);
      document.cookie = `country=${country}; path=/; max-age=31536000`;
      document.cookie = `language=${language}; path=/; max-age=31536000`;
      document.cookie = `currency=${currency}; path=/; max-age=31536000`;
      if (preferredPaymentMethod) {
          document.cookie = `preferred_payment_method=${preferredPaymentMethod}; path=/; max-age=31536000`;
      }

      const token = localStorage.getItem('access_token');
      if (token) {
        try {
          await fetch('/api/user/preferences', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ language, currency })
          });
        } catch (_) {}
      }

      await markComplete();
      window.location.href = '/dashboard';
    }

    async function skipOnboarding() {
      await markComplete();
      window.location.href = '/dashboard';
    }

    async function markComplete() {
      const token = localStorage.getItem('access_token');
      if (!token) return;
      try {
        await fetch('/api/auth/onboarding-complete', {
          method: 'PUT',
          headers: { 'Authorization': `Bearer ${token}` }
        });
      } catch (_) {}
    }

    const COUNTRY_MAPS = {
      US: { language: 'en', currency: 'USD' },
      GB: { language: 'en', currency: 'GBP' },
      ES: { language: 'es', currency: 'EUR' },
      FR: { language: 'fr', currency: 'EUR' },
      DE: { language: 'de', currency: 'EUR' },
      PT: { language: 'pt', currency: 'EUR' },
      BR: { language: 'pt', currency: 'BRL' },
      CN: { language: 'zh', currency: 'CNY' },
      JP: { language: 'ja', currency: 'JPY' },
      IN: { language: 'hi', currency: 'INR' },
      NG: { language: 'yo', currency: 'NGN' },
      CA: { language: 'en', currency: 'CAD' },
      AU: { language: 'en', currency: 'AUD' }
    };

    function detectCountry() {
      try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        if (tz) {
          const tzLower = tz.toLowerCase();
          if (tzLower.includes('america/new_york') || tzLower.includes('america/chicago') || tzLower.includes('america/denver') || tzLower.includes('america/los_angeles') || tzLower.includes('america/anchorage') || tzLower.includes('america/adak') || tzLower.includes('pacific/honolulu')) return 'US';
          if (tzLower.includes('europe/london')) return 'GB';
          if (tzLower.includes('europe/madrid')) return 'ES';
          if (tzLower.includes('europe/paris')) return 'FR';
          if (tzLower.includes('europe/berlin')) return 'DE';
          if (tzLower.includes('europe/lisbon')) return 'PT';
          if (tzLower.includes('america/sao_paulo') || tzLower.includes('america/recife') || tzLower.includes('america/manaus')) return 'BR';
          if (tzLower.includes('asia/shanghai') || tzLower.includes('asia/urumqi')) return 'CN';
          if (tzLower.includes('asia/tokyo')) return 'JP';
          if (tzLower.includes('asia/kolkata') || tzLower.includes('asia/calcutta')) return 'IN';
          if (tzLower.includes('africa/lagos')) return 'NG';
          if (tzLower.includes('america/toronto') || tzLower.includes('america/vancouver') || tzLower.includes('america/edmonton') || tzLower.includes('america/winnipeg')) return 'CA';
          if (tzLower.includes('australia/sydney') || tzLower.includes('australia/melbourne') || tzLower.includes('australia/brisbane') || tzLower.includes('australia/perth')) return 'AU';
        }
      } catch (_) {}
      try {
        const lang = (navigator.language || '').toLowerCase();
        if (lang.endsWith('-us')) return 'US';
        if (lang.endsWith('-gb')) return 'GB';
        if (lang.endsWith('-es') || lang.startsWith('es')) return 'ES';
        if (lang.endsWith('-fr') || lang.startsWith('fr')) return 'FR';
        if (lang.endsWith('-de') || lang.startsWith('de')) return 'DE';
        if (lang.endsWith('-pt') || lang.startsWith('pt')) return lang.includes('br') ? 'BR' : 'PT';
        if (lang.endsWith('-cn') || lang.startsWith('zh')) return 'CN';
        if (lang.endsWith('-jp') || lang.startsWith('ja')) return 'JP';
        if (lang.endsWith('-in') || lang.startsWith('hi')) return 'IN';
        if (lang.endsWith('-ng') || lang.startsWith('yo')) return 'NG';
        if (lang.endsWith('-ca')) return 'CA';
        if (lang.endsWith('-au')) return 'AU';
      } catch (_) {}
      return 'US';
    }

    function onCountryChange(countryCode) {
      if (!countryCode) return;
      const mapping = COUNTRY_MAPS[countryCode];
      if (mapping) {
        document.getElementById('language').value = mapping.language;
        document.getElementById('currency').value = mapping.currency;
      }
      // Re-trigger payment method load if the country is changed
      if (window.paymentMethodSelector) {
          window.paymentMethodSelector.init();
      }
    }

    function restorePreferences() {
      const savedCountry = localStorage.getItem('country');
      const savedLang = localStorage.getItem('language');
      const savedCurr = localStorage.getItem('currency');
      if (savedCountry) {
        document.getElementById('country').value = savedCountry;
      } else {
        const detected = detectCountry();
        document.getElementById('country').value = detected;
        onCountryChange(detected);
      }
      if (savedLang) document.getElementById('language').value = savedLang;
      if (savedCurr) document.getElementById('currency').value = savedCurr;
    }
  </script>
</body>
</html>
