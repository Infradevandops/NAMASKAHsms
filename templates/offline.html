<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FE3C72">
    <title>Offline — Vrenum</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f9fafb;
            color: #111827;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        .offline-container { max-width: 360px; }
        .offline-icon {
            width: 80px; height: 80px;
            margin: 0 auto 24px;
            background: #FFF0F3;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 36px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 8px; }
        p { color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
        .retry-btn {
            background: #FE3C72; color: white; border: none;
            padding: 12px 32px; border-radius: 8px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            touch-action: manipulation;
        }
        .retry-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're offline</h1>
        <p>Check your internet connection and try again. Your data is safe.</p>
        <button class="retry-btn" onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
