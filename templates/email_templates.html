<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Templates - VRENUM ACTV8TN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Email Templates</h1>
            <p class="text-gray-600 mt-2">Customize email templates with your branding</p>
        </div>

        <!-- Template List -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">
            <div id="template-list"></div>
        </div>

        <!-- Template Editor Modal -->
        <div id="editor-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
            <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
                <div class="p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold" id="editor-title">Edit Template</h2>
                        <button onclick="closeEditor()" class="text-gray-500 hover:text-gray-700">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>

                    <!-- Available Variables -->
                    <div class="mb-6 p-4 bg-blue-50 rounded-lg">
                        <h3 class="font-semibold text-blue-900 mb-2">Available Variables</h3>
                        <div id="available-variables" class="flex flex-wrap gap-2"></div>
                    </div>

                    <!-- Subject -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                        <input type="text" id="template-subject" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500" placeholder="Email subject with {{ variables }}">
                    </div>

                    <!-- HTML Content -->
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">HTML Content</label>
                        <textarea id="template-html" rows="12" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 font-mono text-sm" placeholder="HTML content with {{ variables }}"></textarea>
                    </div>

                    <!-- Text Content (Optional) -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Plain Text (Optional)</label>
                        <textarea id="template-text" rows="6" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-purple-500 font-mono text-sm" placeholder="Auto-generated if left empty"></textarea>
                    </div>

                    <!-- Actions -->
                    <div class="flex justify-between">
                        <div class="space-x-2">
                            <button onclick="toggleVersionsPanel()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                                📋 Versions
                            </button>
                            <button onclick="toggleTestPanel()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                ✉️ Test Email
                            </button>
                            <button onclick="toggleAnalyticsPanel()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                                📊 Analytics
                            </button>
                        </div>
                        <div class="space-x-2">
                            <button onclick="deleteTemplate()" id="delete-btn" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                                Delete (Revert to Default)
                            </button>
                            <button onclick="closeEditor()" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
                                Cancel
                            </button>
                            <button onclick="saveTemplate()" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700">
                                Save Template
                            </button>
                        </div>
                    </div>

                    <!-- Versions Panel -->
                    <div id="versions-panel" class="hidden mt-6 border-t pt-4">
                        <h3 class="font-semibold text-gray-800 mb-3">Version History</h3>
                        <div id="versions-list" class="space-y-2 max-h-48 overflow-y-auto"></div>
                    </div>

                    <!-- Test Email Panel -->
                    <div id="test-panel" class="hidden mt-6 border-t pt-4">
                        <h3 class="font-semibold text-gray-800 mb-3">Send Test Email</h3>
                        <div class="flex gap-2">
                            <input type="email" id="test-email-input" placeholder="recipient@example.com"
                                class="flex-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500">
                            <button onclick="sendTestEmailInline()" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
                                Send
                            </button>
                        </div>
                        <p id="test-email-status" class="mt-2 text-sm"></p>
                    </div>

                    <!-- Analytics Panel -->
                    <div id="analytics-panel" class="hidden mt-6 border-t pt-4">
                        <h3 class="font-semibold text-gray-800 mb-3">Template Analytics</h3>
                        <div id="analytics-content" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTemplate = null;
        let templates = [];
        const TOKEN = () => localStorage.getItem('access_token') || localStorage.getItem('token');

        async function loadTemplates() {
            try {
                const response = await fetch('/api/whitelabel/email-templates', {
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                if (!response.ok) throw new Error('Failed to load templates');
                templates = await response.json();
                renderTemplateList();
            } catch (error) {
                console.error('Error loading templates:', error);
            }
        }

        function renderTemplateList() {
            const container = document.getElementById('template-list');
            container.innerHTML = templates.map(t => `
                <div class="bg-white rounded-lg shadow p-6 hover:shadow-lg transition cursor-pointer" onclick="editTemplate('${t.template_name}')">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="text-lg font-semibold capitalize">${t.template_name.replace(/_/g, ' ')}</h3>
                        ${t.has_custom
                            ? '<span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded">Custom</span>'
                            : '<span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded">Default</span>'}
                    </div>
                    <p class="text-sm text-gray-600 mb-4">${t.default_subject}</p>
                    <div class="text-xs text-gray-500">${t.available_variables.length} variables available</div>
                </div>
            `).join('');
        }

        async function editTemplate(templateName) {
            try {
                const response = await fetch(`/api/whitelabel/email-template/${templateName}`, {
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                if (!response.ok) throw new Error('Failed to load template');
                currentTemplate = await response.json();

                document.getElementById('editor-title').textContent = `Edit ${templateName.replace(/_/g, ' ')}`;
                document.getElementById('template-subject').value = currentTemplate.subject;
                document.getElementById('template-html').value = currentTemplate.html_content;
                document.getElementById('template-text').value = currentTemplate.text_content;

                const varsContainer = document.getElementById('available-variables');
                varsContainer.innerHTML = currentTemplate.available_variables.map(v =>
                    `<span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm rounded cursor-pointer hover:bg-blue-200" onclick="insertVariable('${v}')">{{ ${v} }}</span>`
                ).join('');

                document.getElementById('delete-btn').style.display = currentTemplate.active ? 'block' : 'none';

                // Reset sub-panels
                ['versions-panel','test-panel','analytics-panel'].forEach(id =>
                    document.getElementById(id).classList.add('hidden'));

                document.getElementById('editor-modal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading template:', error);
                alert('Failed to load template');
            }
        }

        function insertVariable(varName) {
            const textarea = document.getElementById('template-html');
            const pos = textarea.selectionStart;
            textarea.value = textarea.value.substring(0, pos) + `{{ ${varName} }}` + textarea.value.substring(pos);
            textarea.focus();
        }

        async function saveTemplate() {
            try {
                const response = await fetch('/api/whitelabel/email-template', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        template_name: currentTemplate.template_name,
                        subject: document.getElementById('template-subject').value,
                        html_content: document.getElementById('template-html').value,
                        text_content: document.getElementById('template-text').value || null
                    })
                });
                if (!response.ok) throw new Error((await response.json()).detail || 'Failed to save');
                closeEditor();
                loadTemplates();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteTemplate() {
            if (!confirm('Delete custom template and revert to default?')) return;
            try {
                const response = await fetch(`/api/whitelabel/email-template/${currentTemplate.template_name}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                if (!response.ok) throw new Error('Failed to delete');
                closeEditor();
                loadTemplates();
            } catch (error) {
                alert('Failed to delete template');
            }
        }

        function closeEditor() {
            document.getElementById('editor-modal').classList.add('hidden');
            currentTemplate = null;
        }

        // ── Versions panel ────────────────────────────────────────────────────
        async function toggleVersionsPanel() {
            const panel = document.getElementById('versions-panel');
            if (!panel.classList.toggle('hidden')) return; // closing
            ['test-panel','analytics-panel'].forEach(id => document.getElementById(id).classList.add('hidden'));

            if (!currentTemplate?.active) {
                document.getElementById('versions-list').innerHTML = '<p class="text-sm text-gray-500">No version history for default templates.</p>';
                return;
            }
            try {
                const res = await fetch(`/api/whitelabel/email-template/${currentTemplate.template_name}/versions`, {
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                const versions = await res.json();
                if (!versions.length) {
                    document.getElementById('versions-list').innerHTML = '<p class="text-sm text-gray-500">No versions saved yet.</p>';
                    return;
                }
                document.getElementById('versions-list').innerHTML = versions.map(v => `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                        <div>
                            <span class="font-medium text-sm">v${v.version_number}</span>
                            <span class="text-gray-500 text-xs ml-2">${v.version_note}</span>
                            <div class="text-xs text-gray-400">${new Date(v.created_at).toLocaleString()}</div>
                        </div>
                        <button onclick="revertToVersion(${v.version_number})" class="px-3 py-1 text-xs bg-blue-600 text-white rounded hover:bg-blue-700">Revert</button>
                    </div>
                `).join('');
            } catch {
                document.getElementById('versions-list').innerHTML = '<p class="text-sm text-red-500">Failed to load versions.</p>';
            }
        }

        async function revertToVersion(versionNumber) {
            if (!confirm(`Revert to version ${versionNumber}?`)) return;
            try {
                const res = await fetch(`/api/whitelabel/email-template/${currentTemplate.template_name}/revert/${versionNumber}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                if (!res.ok) throw new Error();
                closeEditor();
                loadTemplates();
            } catch {
                alert('Failed to revert version');
            }
        }

        // ── Test email panel ──────────────────────────────────────────────────
        function toggleTestPanel() {
            const panel = document.getElementById('test-panel');
            panel.classList.toggle('hidden');
            ['versions-panel','analytics-panel'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById('test-email-status').textContent = '';
        }

        async function sendTestEmailInline() {
            const email = document.getElementById('test-email-input').value.trim();
            const status = document.getElementById('test-email-status');
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                status.textContent = 'Enter a valid email address.';
                status.className = 'mt-2 text-sm text-red-600';
                return;
            }
            status.textContent = 'Sending…';
            status.className = 'mt-2 text-sm text-gray-500';
            try {
                const res = await fetch('/api/whitelabel/email-template/test', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN()}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ template_name: currentTemplate.template_name, recipient_email: email })
                });
                if (!res.ok) throw new Error();
                status.textContent = `✅ Test email sent to ${email}`;
                status.className = 'mt-2 text-sm text-green-600';
            } catch {
                status.textContent = '❌ Failed to send test email.';
                status.className = 'mt-2 text-sm text-red-600';
            }
        }

        // ── Analytics panel ───────────────────────────────────────────────────
        async function toggleAnalyticsPanel() {
            const panel = document.getElementById('analytics-panel');
            if (!panel.classList.toggle('hidden')) return;
            ['versions-panel','test-panel'].forEach(id => document.getElementById(id).classList.add('hidden'));

            if (!currentTemplate?.active) {
                document.getElementById('analytics-content').innerHTML = '<p class="text-sm text-gray-500 col-span-4">No analytics for default templates.</p>';
                return;
            }
            try {
                const res = await fetch(`/api/whitelabel/email-template/${currentTemplate.template_name}/analytics`, {
                    headers: { 'Authorization': `Bearer ${TOKEN()}` }
                });
                const a = await res.json();
                document.getElementById('analytics-content').innerHTML = [
                    ['Sent', a.sent_count],
                    [`Opened (${a.open_rate}%)`, a.opened_count],
                    [`Clicked (${a.click_rate}%)`, a.clicked_count],
                    [`Bounced (${a.bounce_rate}%)`, a.bounced_count],
                ].map(([label, val]) => `
                    <div class="bg-gray-50 rounded-lg p-4 text-center">
                        <div class="text-2xl font-bold text-gray-800">${val ?? 0}</div>
                        <div class="text-xs text-gray-500 mt-1">${label}</div>
                    </div>
                `).join('');
            } catch {
                document.getElementById('analytics-content').innerHTML = '<p class="text-sm text-red-500 col-span-4">Failed to load analytics.</p>';
            }
        }

        // Load templates on page load
        loadTemplates();
    </script>
</body>
</html>
