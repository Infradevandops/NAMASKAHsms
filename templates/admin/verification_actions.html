<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Actions - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    {% include 'admin/header.html' %}

    <div class="container-fluid mt-4">
        <div class="row mb-4">
            <div class="col-md-12">
                <h2>Verification Actions</h2>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="row mb-4">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <label class="form-label">Verification ID</label>
                                <input type="text" class="form-control" id="quickVerificationId" placeholder="Enter verification ID">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">&nbsp;</label>
                                <div class="btn-group w-100">
                                    <button class="btn btn-warning" onclick="cancelVerification()">
                                        <i class="bi bi-x-circle"></i> Cancel
                                    </button>
                                    <button class="btn btn-success" onclick="refundVerification()">
                                        <i class="bi bi-cash"></i> Refund
                                    </button>
                                    <button class="btn btn-info" onclick="viewDetails()">
                                        <i class="bi bi-eye"></i> View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Active Verifications -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between">
                <h5>Active Verifications</h5>
                <button class="btn btn-sm btn-primary" onclick="loadActiveVerifications()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh
                </button>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>User</th>
                                <th>Service</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Created</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="activeTable">
                            <tr>
                                <td colspan="7" class="text-center">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Bulk Actions -->
        <div class="card">
            <div class="card-header">
                <h5>Bulk Actions</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Action Type</label>
                        <select class="form-select" id="bulkAction">
                            <option value="cancel">Cancel All Stuck</option>
                            <option value="refund">Refund All Failed</option>
                            <option value="cleanup">Cleanup Old</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Time Range</label>
                        <select class="form-select" id="bulkTimeRange">
                            <option value="1">Last 1 hour</option>
                            <option value="6">Last 6 hours</option>
                            <option value="24">Last 24 hours</option>
                            <option value="168">Last 7 days</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-danger w-100" onclick="executeBulkAction()">
                            <i class="bi bi-lightning"></i> Execute Bulk Action
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div class="modal fade" id="detailsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Verification Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="verificationDetails"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-warning" onclick="cancelFromModal()">Cancel Verification</button>
                    <button type="button" class="btn btn-success" onclick="refundFromModal()">Issue Refund</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentVerification = null;

        async function loadActiveVerifications() {
            try {
                const response = await fetch('/api/admin/verifications?status=active&limit=50', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const data = await response.json();

                const tbody = document.getElementById('activeTable');
                if (!data.verifications || data.verifications.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center">No active verifications</td></tr>';
                    return;
                }

                tbody.innerHTML = data.verifications.map(v => `
                    <tr>
                        <td>${v.id.substring(0, 8)}</td>
                        <td>${v.user_id ? v.user_id.substring(0, 8) : 'N/A'}</td>
                        <td>${v.service_name || 'N/A'}</td>
                        <td>${v.phone_number || 'Pending'}</td>
                        <td><span class="badge bg-${getStatusColor(v.status)}">${v.status}</span></td>
                        <td>${new Date(v.created_at).toLocaleString()}</td>
                        <td>
                            <button class="btn btn-sm btn-info" onclick="viewVerification('${v.id}')">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-sm btn-warning" onclick="quickCancel('${v.id}')">
                                <i class="bi bi-x"></i>
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Failed to load verifications:', error);
                document.getElementById('activeTable').innerHTML =
                    '<tr><td colspan="7" class="text-center text-danger">Failed to load verifications</td></tr>';
            }
        }

        async function cancelVerification() {
            const id = document.getElementById('quickVerificationId').value.trim();
            if (!id) {
                alert('Please enter a verification ID');
                return;
            }

            if (!confirm(`Cancel verification ${id}?`)) return;

            try {
                const response = await fetch(`/api/admin/verifications/${id}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: 'Admin cancellation' })
                });

                if (response.ok) {
                    alert('Verification cancelled successfully');
                    document.getElementById('quickVerificationId').value = '';
                    loadActiveVerifications();
                } else {
                    alert('Failed to cancel verification');
                }
            } catch (error) {
                console.error('Failed to cancel:', error);
                alert('Failed to cancel verification');
            }
        }

        async function refundVerification() {
            const id = document.getElementById('quickVerificationId').value.trim();
            if (!id) {
                alert('Please enter a verification ID');
                return;
            }

            if (!confirm(`Issue refund for verification ${id}?`)) return;

            try {
                const response = await fetch(`/api/admin/verifications/${id}/refund`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: 'Admin refund' })
                });

                if (response.ok) {
                    alert('Refund issued successfully');
                    document.getElementById('quickVerificationId').value = '';
                } else {
                    alert('Failed to issue refund');
                }
            } catch (error) {
                console.error('Failed to refund:', error);
                alert('Failed to issue refund');
            }
        }

        async function viewDetails() {
            const id = document.getElementById('quickVerificationId').value.trim();
            if (!id) {
                alert('Please enter a verification ID');
                return;
            }
            viewVerification(id);
        }

        async function viewVerification(id) {
            try {
                const response = await fetch(`/api/admin/verifications/${id}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                const verification = await response.json();
                currentVerification = verification;

                const details = document.getElementById('verificationDetails');
                details.innerHTML = `
                    <table class="table table-sm">
                        <tr><td><strong>ID:</strong></td><td>${verification.id}</td></tr>
                        <tr><td><strong>User ID:</strong></td><td>${verification.user_id || 'N/A'}</td></tr>
                        <tr><td><strong>Service:</strong></td><td>${verification.service_name || 'N/A'}</td></tr>
                        <tr><td><strong>Phone:</strong></td><td>${verification.phone_number || 'Pending'}</td></tr>
                        <tr><td><strong>Status:</strong></td><td><span class="badge bg-${getStatusColor(verification.status)}">${verification.status}</span></td></tr>
                        <tr><td><strong>Cost:</strong></td><td>$${(verification.cost || 0).toFixed(2)}</td></tr>
                        <tr><td><strong>Created:</strong></td><td>${new Date(verification.created_at).toLocaleString()}</td></tr>
                        <tr><td><strong>Refunded:</strong></td><td>${verification.refunded ? 'Yes' : 'No'}</td></tr>
                    </table>
                `;

                new bootstrap.Modal(document.getElementById('detailsModal')).show();
            } catch (error) {
                console.error('Failed to load verification:', error);
                alert('Failed to load verification details');
            }
        }

        async function quickCancel(id) {
            if (!confirm(`Cancel verification ${id}?`)) return;

            try {
                const response = await fetch(`/api/admin/verifications/${id}/cancel`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason: 'Admin cancellation' })
                });

                if (response.ok) {
                    alert('Verification cancelled');
                    loadActiveVerifications();
                } else {
                    alert('Failed to cancel');
                }
            } catch (error) {
                console.error('Failed to cancel:', error);
                alert('Failed to cancel');
            }
        }

        function cancelFromModal() {
            if (currentVerification) {
                bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide();
                document.getElementById('quickVerificationId').value = currentVerification.id;
                cancelVerification();
            }
        }

        function refundFromModal() {
            if (currentVerification) {
                bootstrap.Modal.getInstance(document.getElementById('detailsModal')).hide();
                document.getElementById('quickVerificationId').value = currentVerification.id;
                refundVerification();
            }
        }

        async function executeBulkAction() {
            const action = document.getElementById('bulkAction').value;
            const hours = document.getElementById('bulkTimeRange').value;

            if (!confirm(`Execute bulk ${action} for last ${hours} hours?`)) return;

            try {
                const response = await fetch(`/api/admin/verifications/bulk/${action}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ hours: parseInt(hours) })
                });

                if (response.ok) {
                    const data = await response.json();
                    alert(`Bulk action completed: ${data.affected || 0} verifications processed`);
                    loadActiveVerifications();
                } else {
                    alert('Failed to execute bulk action');
                }
            } catch (error) {
                console.error('Failed to execute bulk action:', error);
                alert('Failed to execute bulk action');
            }
        }

        function getStatusColor(status) {
            const colors = {
                active: 'primary',
                pending: 'warning',
                completed: 'success',
                failed: 'danger',
                timeout: 'warning',
                cancelled: 'secondary'
            };
            return colors[status] || 'secondary';
        }

        loadActiveVerifications();
        setInterval(loadActiveVerifications, 30000);
    </script>
</body>
</html>
