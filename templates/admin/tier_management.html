<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRENUM ACTV8TN | Tier Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/admin_premium.css">
</head>
<body class="premium-admin">
    <div class="admin-v2-container">
        {% include 'admin/header.html' %}

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <h2 style="font-size:24px; font-weight:700;">Tier Management</h2>
            <a href="/admin" class="btn-secondary" style="text-decoration:none; padding:8px 16px; border-radius:8px;">← Back to Admin</a>
        </div>

        <div class="dashboard-grid" style="margin-bottom:32px;">
            <div class="stat-card">
                <div class="stat-label">Freemium Users</div>
                <div class="stat-value" id="count-freemium">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">PAYG Users</div>
                <div class="stat-value" id="count-payg">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Pro Users</div>
                <div class="stat-value" id="count-pro">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Custom Users</div>
                <div class="stat-value" id="count-custom">--</div>
            </div>
        </div>

        <div class="glass-card">
            <h3 class="card-title">All Users by Tier</h3>
            <table class="admin-table">
                <thead>
                    <tr><th>Email</th><th>Current Tier</th><th>Credits</th><th>Joined</th><th>Actions</th></tr>
                </thead>
                <tbody id="tier-users-table">
                    <tr><td colspan="5" style="text-align:center; padding:40px; color:var(--admin-text-muted);">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('access_token');
        const headers = { 'Authorization': `Bearer ${token}` };

        async function loadTierData() {
            try {
                const res = await fetch('/api/admin/users', { headers });
                if (!res.ok) return;
                const data = await res.json();
                const users = data.users || data || [];

                const counts = { freemium: 0, payg: 0, pro: 0, custom: 0 };
                let html = '';

                users.forEach(u => {
                    const tier = u.subscription_tier || 'freemium';
                    counts[tier] = (counts[tier] || 0) + 1;
                    html += `<tr>
                        <td>${u.email}</td>
                        <td><span style="text-transform:capitalize;">${tier}</span></td>
                        <td>$${parseFloat(u.credits || 0).toFixed(2)}</td>
                        <td>${new Date(u.created_at).toLocaleDateString()}</td>
                        <td>
                            <select onchange="changeTier('${u.id}', this.value)" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:white; padding:4px 8px; border-radius:4px;">
                                ${['freemium','payg','pro','custom'].map(t => `<option value="${t}" ${t===tier?'selected':''}>${t}</option>`).join('')}
                            </select>
                        </td>
                    </tr>`;
                });

                document.getElementById('tier-users-table').innerHTML = html || '<tr><td colspan="5" style="text-align:center;">No users found</td></tr>';
                Object.keys(counts).forEach(t => {
                    const el = document.getElementById(`count-${t}`);
                    if (el) el.textContent = counts[t];
                });
            } catch (e) {
                console.error('Failed to load tier data:', e);
            }
        }

        async function changeTier(userId, newTier) {
            if (!confirm(`Change user to ${newTier}?`)) return;
            try {
                const res = await fetch(`/api/admin/users/${userId}/tier`, {
                    method: 'PUT',
                    headers: { ...headers, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tier: newTier })
                });
                if (res.ok) {
                    alert('Tier updated');
                    loadTierData();
                } else {
                    alert('Failed to update tier');
                }
            } catch (e) { alert('Error: ' + e.message); }
        }

        loadTierData();
    </script>
</body>
</html>
