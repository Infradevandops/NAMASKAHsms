<!-- Admin Header Component V2 - Institutional Grade -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/admin_premium.css">

<div class="admin-v2-header">
    <div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">Control Center</h1>
        <p style="color: var(--admin-text-muted); font-size: 13px;">Phase 5.0 Admin Intelligence</p>
    </div>

    <div class="admin-v2-nav">
        <a href="/admin" class="nav-item" id="btn-dashboard">Overview</a>
        <a href="/admin/user-management" class="nav-item" id="btn-users">Users</a>
        <a href="/admin/support-tickets" class="nav-item" id="btn-support">Support</a>
        <a href="/admin/kyc-management" class="nav-item" id="btn-kyc">KYC</a>
        <a href="/admin/compliance" class="nav-item" id="btn-compliance">Compliance</a>
        <a href="/admin/refund-monitoring" class="nav-item" id="btn-refunds">Refunds</a>
        <a href="/admin/verification-actions" class="nav-item" id="btn-verifications">Verifications</a>
        <a href="/admin/analytics-advanced" class="nav-item" id="btn-analytics">Analytics</a>
        <a href="/admin/disaster-recovery" class="nav-item" id="btn-disaster">DR</a>
        <a href="/admin/alerts" class="nav-item" id="btn-alerts">Alerts</a>
        <a href="/admin/export" class="nav-item" id="btn-export">Export</a>
        <a href="/admin/actions" class="nav-item" id="btn-actions">Actions</a>
    </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    document.addEventListener('DOMContentLoaded', () => {
        const path = window.location.pathname;
        if (path === '/admin') document.getElementById('btn-dashboard').classList.add('active');
        if (path === '/admin/user-management') document.getElementById('btn-users').classList.add('active');
        if (path === '/admin/support-tickets') document.getElementById('btn-support').classList.add('active');
        if (path === '/admin/kyc-management') document.getElementById('btn-kyc').classList.add('active');
        if (path === '/admin/compliance') document.getElementById('btn-compliance').classList.add('active');
        if (path === '/admin/refund-monitoring') document.getElementById('btn-refunds').classList.add('active');
        if (path === '/admin/verification-actions') document.getElementById('btn-verifications').classList.add('active');
        if (path === '/admin/analytics-advanced') document.getElementById('btn-analytics').classList.add('active');
        if (path === '/admin/disaster-recovery') document.getElementById('btn-disaster').classList.add('active');
        if (path === '/admin/alerts') document.getElementById('btn-alerts').classList.add('active');
        if (path === '/admin/export') document.getElementById('btn-export').classList.add('active');
        if (path === '/admin/actions') document.getElementById('btn-actions').classList.add('active');
    });
</script>
