<!-- Admin Header Component V2 - Institutional Grade -->
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/admin_premium.css">

<div class="admin-v2-header">
    <div>
        <h1 style="font-size: 24px; font-weight: 700; margin-bottom: 4px;">Control Center</h1>
        <p style="color: var(--admin-text-muted); font-size: 13px;">Phase 6.0 Institutional Infrastructure</p>
    </div>
    
    <div class="admin-v2-nav">
        <a href="/admin" class="nav-item" id="btn-dashboard">Overview</a>
        <a href="/admin/tier-management" class="nav-item" id="btn-tier">Targets</a>
        <a href="/admin/pricing-templates" class="nav-item" id="btn-pricing">Pricing</a>
        <a href="/admin/rentals" class="nav-item" id="btn-rentals">Rentals</a>
        <a href="/admin/verification-history" class="nav-item" id="btn-history">Logs</a>
    </div>
</div>

<script nonce="{{ request.state.csp_nonce }}">
    document.addEventListener('DOMContentLoaded', () => {
        const path = window.location.pathname;
        if (path === '/admin') document.getElementById('btn-dashboard').classList.add('active');
        if (path === '/admin/tier-management') document.getElementById('btn-tier').classList.add('active');
        if (path === '/admin/pricing-templates') document.getElementById('btn-pricing').classList.add('active');
        if (path === '/admin/rentals') document.getElementById('btn-rentals').classList.add('active');
        if (path === '/admin/verification-history') document.getElementById('btn-history').classList.add('active');
    });
</script>
