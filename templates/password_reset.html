<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  {% include "includes/pwa_head.html" %}
  <meta name="description" content="Reset your vrenum.app password">
  <title>Password Reset - Vrenum</title>
  <link rel="stylesheet" href="/static/css/vrenum-ui.css">
  <link rel="stylesheet" href="/static/css/glassmorphism.css?v=20260518">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <style>
    .auth-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
      padding: 1rem;
    }

    .auth-card {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--neutral);
      margin: 0;
    }

    .security-notice {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.75rem;
      font-size: 0.9rem;
      color: #1e40af;
    }

    .security-notice svg {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .btn-block {
      width: 100%;
      margin-top: 1.5rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .auth-footer a {
      color: var(--primary, #FE3C72);
      text-decoration: none;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }
  </style>
  <link rel="stylesheet" href="/static/css/pwa-mobile.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive reset instructions</p>
      </div>

      <div class="security-notice">
        <i class="ph ph-lock"></i>
        <span>We'll send a secure link to your email</span>
      </div>

      <form id="resetForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            placeholder="your@email.com"
            required
          >
          <small class="form-error"></small>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="ph ph-mail"></i>
          Send Reset Link
        </button>
      </form>

      <div class="auth-footer">
        <p>Remember your password? <a href="/login">Back to Login</a></p>
      </div>
    </div>
  </div>


  <script src="/static/js/main.js"></script>
  <script nonce="{{ request.state.csp_nonce }}">
    // Check if we have a reset token in the URL (step 2: set new password)
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (resetToken) {
      // Show the "set new password" form instead
      document.querySelector('.auth-header h1').textContent = 'Set New Password';
      document.querySelector('.auth-header p').textContent = 'Enter your new password below';
      document.querySelector('.security-notice span').textContent = 'Choose a strong password with at least 8 characters';

      document.getElementById('resetForm').innerHTML = `
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-control" placeholder="Minimum 8 characters" required minlength="8">
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Repeat your password" required minlength="8">
        </div>
        <button type="submit" class="btn btn-primary btn-block">
          <i class="ph ph-check"></i> Reset Password
        </button>
      `;

      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newPass = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;
        const btn = e.target.querySelector('button[type="submit"]');

        if (newPass !== confirmPass) {
          alert('Passwords do not match');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
          const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: resetToken, new_password: newPass })
          });
          const data = await res.json();
          if (res.ok) {
            alert('Password reset successfully! Please log in.');
            window.location.href = '/login';
          } else {
            alert(data.detail || 'Reset failed. The link may have expired.');
            btn.disabled = false;
            btn.textContent = 'Reset Password';
          }
        } catch (err) {
          alert('Network error. Please try again.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      });
    } else {
      // Step 1: request reset link
      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const btn = e.target.querySelector('button[type="submit"]');

        btn.disabled = true;
        btn.textContent = 'Sending...';

        try {
          const res = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });

          if (res.ok) {
            alert('If that email exists, a reset link has been sent. Check your inbox.');
            e.target.reset();
          } else {
            alert('Failed to send reset link. Please try again.');
          }
        } catch (err) {
          alert('Network error. Please try again.');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Send Reset Link';
        }
      });
    }
  </script>
{% include "includes/pwa_sw.html" %}
</body>
</html>
