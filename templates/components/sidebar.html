<script nonce="{{ request.state.csp_nonce }}">
    // Tier hierarchy for access checks
    const TIER_HIERARCHY = {
        'freemium': 0,
        'payg': 1,
        'pro': 2,
        'custom': 3
    };

    // Current user tier (will be loaded from API)
    let currentUserTier = 'freemium';

    /**
     * Check if user tier has access to required tier
     */
    function hasTierAccess(userTier, requiredTier) {
        const userLevel = TIER_HIERARCHY[userTier] || 0;
        const requiredLevel = TIER_HIERARCHY[requiredTier] || 0;
        return userLevel >= requiredLevel;
    }

    /**
     * Load user tier from API and update sidebar visibility
     */
    async function loadUserTierForSidebar() {
        try {
            const token = localStorage.getItem('access_token');
            if (!token) { updateSidebarVisibility('freemium'); return; }
            const response = await fetch('/api/v1/billing/tiers/current', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                const data = await response.json();
                currentUserTier = data.current_tier || 'freemium';
            } else {
                currentUserTier = 'freemium';
            }
        } catch (error) {
            console.error('[Sidebar] Failed to load user tier:', error);
            currentUserTier = 'freemium';
        }
        updateSidebarVisibility(currentUserTier);
    }

    function updateSidebarVisibility(userTier) {
        document.querySelectorAll('.nav-item.tier-gated').forEach(item => {
            const hasAccess = hasTierAccess(userTier, item.dataset.minTier || 'payg');
            item.style.display = hasAccess ? 'flex' : 'none';
        });
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('app-sidebar');
        const toggleBtn = document.querySelector('.sidebar-toggle');
        const isExpanded = sidebar.classList.toggle('active');

        // Update aria-expanded for accessibility
        if (toggleBtn) {
            toggleBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
        }
    }

    function logout() {
        if (!confirm('Are you sure you want to logout?')) return;

        const token = localStorage.getItem('access_token');

        fetch('/api/auth/logout', {
            method: 'POST',
            headers: token ? { 'Authorization': `Bearer ${token}` } : {}
        })
            .then(() => {
                localStorage.removeItem('access_token');
                window.location.href = '/';
            })
            .catch(() => {
                localStorage.removeItem('access_token');
                window.location.href = '/';
            });
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Set active nav item with aria-current for accessibility
        const path = window.location.pathname.split('/')[1] || 'dashboard';
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.page === path) {
                item.classList.add('active');
                item.setAttribute('aria-current', 'page');
            }
        });

        // Set language switcher value
        const currentLang = localStorage.getItem('language') || 'en';
        const langSwitcher = document.getElementById('lang-switcher');
        if (langSwitcher) langSwitcher.value = currentLang;

        // Load user tier and update sidebar
        loadUserTierForSidebar();

    });
</script>
