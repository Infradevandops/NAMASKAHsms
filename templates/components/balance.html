<div class="balance-chip" id="balance-display">$0.00</div>
<a href="/settings?tab=account" class="account-cta-btn" title="Account Settings" aria-label="Account Settings">⚙️</a>

<style>
.balance-chip { 
    background: #f0f0f0; 
    color: #333; 
    padding: 8px 16px; 
    border-radius: 8px; 
    font-weight: 600; 
    font-size: 14px; 
    cursor: pointer; 
    transition: all 0.2s; 
}
.balance-chip:hover { background: #e8e8e8; }
.balance-chip.loading { opacity: 0.6; }
.account-cta-btn {
    font-size: 18px;
    text-decoration: none;
    padding: 6px;
    border-radius: 8px;
    transition: background 0.2s;
    line-height: 1;
}
.account-cta-btn:hover { background: #e8e8e8; }
</style>

<script nonce="{{ request.state.csp_nonce }}">
async function loadBalance(silent = false) {
    const display = document.getElementById('balance-display');
    if (!display) return;
    
    if (!silent) display.classList.add('loading');
    
    try {
        const token = localStorage.getItem('access_token');
        if (!token) {
            display.textContent = formatMoney(0);
            return;
        }
        
        // Check if user is admin
        const userRes = await fetch('/api/user/me', {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (userRes.ok) {
            const userData = await userRes.json();
            // Always show account credit balance for consistency with notifications
        }
        
        // For non-admin users, show their account balance
        const res = await fetch('/api/billing/balance', {
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Cache-Control': 'no-cache' 
            }
        });
        
        if (res.ok) {
            const data = await res.json();
            const balance = data.balance || data.credits || 0;
            display.textContent = formatMoney(parseFloat(balance));
        } else {
            display.textContent = formatMoney(0);
        }
    } catch (error) {
        console.error('Balance load error:', error);
        display.textContent = formatMoney(0);
    } finally {
        display.classList.remove('loading');
    }
}

// Load on page load
if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadBalance);
} else {
    loadBalance();
}

// Refresh every 30 seconds (silent — no visual flicker)
setInterval(() => loadBalance(true), 30000);

// Expose globally for manual refresh
window.refreshBalance = loadBalance;
</script>
