services:
  # Backend and Frontend (Vite SSR or Static as per project)
  - type: web
    name: vrenum-api-staging
    env: python
    plan: free
    buildCommand: pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vrenum-db-staging
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vrenum-redis-staging
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: staging
      - key: API_V1_PREFIX
        value: /api/v1

  # PostgreSQL Database
  - type: db
    name: vrenum-db-staging
    plan: free
    region: ohio

  # Redis Cache
  - type: redis
    name: vrenum-redis-staging
    plan: free
    region: ohio
    maxmemoryPolicy: allkeys-lru
